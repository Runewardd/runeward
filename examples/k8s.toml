# A minimal Kubernetes-backed profile. Used by the declarative CRD/controller
# flow and the k8s backend walkthrough in docs/E2E-TESTING.md.
#
#   ./bin/runeward up
#   kubectl -n runeward create configmap runeward-profiles --from-file=examples/
#   kubectl apply -f - <<'EOF'
#   apiVersion: runeward.dev/v1alpha1
#   kind: Sandbox
#   metadata: { name: demo, namespace: runeward }
#   spec: { profile: k8s }
#   EOF

[host]
type    = "k8s"
image   = "debian:stable-slim"
workdir = "/workspace"

[limits]
max_execs = 100
