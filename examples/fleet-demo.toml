# A multi-agent fleet: N sandboxes from one contract sharing an atomic task
# board. Workers (agents) claim tasks from the board and run them against their
# assigned sandbox via the governed tool API.
#
#   runeward --config-dir examples serve
#   POST /v1/fleets {"profile":"fleet-demo"}

[host]
type    = "container"
image   = "debian:stable-slim"
workdir = "/workspace"

[cohort]
replicas   = 2
task_board = ["build module A", "build module B", "run integration tests"]

[rationing]
max_execs = 500
