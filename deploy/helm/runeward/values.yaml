# Default values for the runeward chart.

image:
  repository: runeward
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

controller:
  enabled: true
  replicas: 1
  workers: 2
  allNamespaces: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi

webhook:
  enabled: false
  port: 8443
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi

server:
  enabled: false
  replicas: 1
  port: 8080
  noUI: false
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Profiles mounted at /etc/runeward/profiles (filename -> TOML), or reuse an
# existing ConfigMap. See docs for the profile schema.
profiles:
  create: false
  existingConfigMap: ""
  data: {}

egress:
  image: runeward-egress:latest

stateDir: /var/lib/runeward

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
