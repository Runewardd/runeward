{{- if .Values.rbac.create -}}
{{- $clusterScoped := and .Values.controller.enabled .Values.controller.allNamespaces -}}
{{- $kind := ternary "ClusterRole" "Role" $clusterScoped -}}
{{- $bindingKind := ternary "ClusterRoleBinding" "RoleBinding" $clusterScoped -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ $kind }}
metadata:
  name: {{ include "runeward.fullname" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
rules:
  {{- if .Values.controller.enabled }}
  - apiGroups: ["runeward.dev"]
    resources: ["sandboxes", "fleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["runeward.dev"]
    resources: ["sandboxes/status", "fleets/status"]
    verbs: ["get", "update", "patch"]
  {{- end }}
  # Drive the Kubernetes backend (pods + workspace PVCs + egress config).
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ $bindingKind }}
metadata:
  name: {{ include "runeward.fullname" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ $kind }}
  name: {{ include "runeward.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runeward.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.controller.enabled }}
---
# ClusterSandbox/ClusterFleet are cluster-scoped, so their reconcile permissions
# always require a ClusterRole regardless of controller.allNamespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runeward.fullname" . }}-cluster
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
rules:
  - apiGroups: ["runeward.dev"]
    resources: ["clustersandboxes", "clusterfleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["runeward.dev"]
    resources: ["clustersandboxes/status", "clusterfleets/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "runeward.fullname" . }}-cluster
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "runeward.fullname" . }}-cluster
subjects:
  - kind: ServiceAccount
    name: {{ include "runeward.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
