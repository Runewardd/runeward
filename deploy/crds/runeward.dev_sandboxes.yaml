apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.runeward.dev
spec:
  group: runeward.dev
  scope: Namespaced
  names:
    kind: Sandbox
    listKind: SandboxList
    plural: sandboxes
    singular: sandbox
    shortNames:
      - sbx
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Sandbox is a declarative request for one governed runeward execution
            cell. The runeward controller reconciles it onto the Kubernetes
            backend (Pod + PVC), applying the named profile's policy, egress, and
            guardrails.
          properties:
            spec:
              type: object
              required:
                - profile
              properties:
                profile:
                  type: string
                  description: Name of the runeward profile to provision from.
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: One of Pending, Running, Failed, Terminating.
                sandboxId:
                  type: string
                  description: The runeward sandbox id backing this resource.
                backend:
                  type: string
                image:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Sandbox
          type: string
          jsonPath: .status.sandboxId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
