apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: citadels.runeward.dev
spec:
  group: runeward.dev
  scope: Namespaced
  names:
    kind: Citadel
    listKind: CitadelList
    plural: citadels
    singular: citadel
    shortNames:
      - ctd
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Citadel is a declarative request for one governed runeward execution
            cell. The runeward controller reconciles it onto the Kubernetes
            backend (Pod + PVC), applying the named profile's policy, egress, and
            guardrails.
          properties:
            spec:
              type: object
              required:
                - profile
              properties:
                profile:
                  type: string
                  description: Name of the runeward profile to provision from.
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: One of Pending, Running, Failed, Terminating.
                citadelId:
                  type: string
                  description: The runeward citadel id backing this resource.
                backend:
                  type: string
                image:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Citadel
          type: string
          jsonPath: .status.citadelId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
