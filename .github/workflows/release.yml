name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  # Required for cosign keyless (Fulcio/Rekor) signing via GitHub OIDC.
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  # GoReleaser builds the cross-platform binaries, archives, checksums.txt and
  # SBOMs, and creates the GitHub Release for the tag.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # syft powers the SBOM generation configured in .goreleaser.yaml.
      - uses: anchore/sbom-action/download-syft@v0
      # cosign signs checksums.txt (keyless) as configured in .goreleaser.yaml.
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to adefemi171/homebrew-tap. If the secret is
          # unset this is empty and the Homebrew upload is skipped (see the
          # skip_upload guard in .goreleaser.yaml), so releases still succeed.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  images:
    runs-on: ubuntu-latest
    # Don't upload the build-record (*.dockerbuild) artifacts; the release job
    # downloads all artifacts and those records can flake the download step.
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runeward image
        id: runeward
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha,scope=runeward
          cache-to: type=gha,mode=max,scope=runeward

      - name: Build & push runeward-egress image
        id: egress
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.egress
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-egress:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}-egress:latest
          cache-from: type=gha,scope=runeward-egress
          cache-to: type=gha,mode=max,scope=runeward-egress

      # Keyless (Fulcio/Rekor) signature over each image by digest. Signing the
      # digest covers every tag that points at it. Verify with:
      #   cosign verify ghcr.io/adefemi171/runeward:<tag> \
      #     --certificate-identity-regexp 'https://github.com/adefemi171/runeward' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      - name: Sign images with cosign (keyless)
        env:
          COSIGN_YES: "true"
          RUNEWARD_DIGEST: ${{ steps.runeward.outputs.digest }}
          EGRESS_DIGEST: ${{ steps.egress.outputs.digest }}
        run: |
          cosign sign "${REGISTRY}/${{ github.repository }}@${RUNEWARD_DIGEST}"
          cosign sign "${REGISTRY}/${{ github.repository }}-egress@${EGRESS_DIGEST}"

  # Package the Helm chart and attach it to the release GoReleaser created.
  chart:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Package Helm chart
        run: |
          mkdir -p dist-chart
          helm package deploy/helm/runeward --destination dist-chart \
            --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
      - name: Attach chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-chart/*.tgz
