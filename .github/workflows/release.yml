name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist-bin
          ldflags="-s -w -X github.com/adefemi171/runeward/internal/cli.version=${VERSION}"
          for cmd in runeward runeward-egress runeward-agent; do
            if [ -d "./cmd/$cmd" ]; then
              out="dist-bin/${cmd}_${GOOS}_${GOARCH}"
              CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out" "./cmd/$cmd"
            fi
          done
          (cd dist-bin && for f in *_${GOOS}_${GOARCH}; do tar czf "${f}.tar.gz" "$f"; rm "$f"; done)

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist-bin/*.tar.gz

  images:
    runs-on: ubuntu-latest
    # Don't upload the build-record (*.dockerbuild) artifacts; the release job
    # downloads all artifacts and those records can flake the download step.
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runeward image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest

      - name: Build & push runeward-egress image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.egress
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-egress:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}-egress:latest

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Package Helm chart
        run: |
          mkdir -p dist-chart
          helm package deploy/helm/runeward --destination dist-chart \
            --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist-chart/*.tgz

  release:
    needs: [binaries, images, chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tgz
