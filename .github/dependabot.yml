version: 2
updates:
  # Go module dependencies (root go.mod).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut noise.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Base images referenced by the Dockerfiles under deploy/.
  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
